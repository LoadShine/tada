name: Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "Tada ${GITHUB_REF_NAME}" \
              --notes "Cross-platform Tada desktop builds for ${GITHUB_REF_NAME}." \
              --latest

  create-release:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-15-intel'
            target: 'x86_64-apple-darwin'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
          - platform: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build App (Custom Script)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_TARGET: ${{ matrix.target }}
        run: pnpm build:desktop

      - name: Upload Release Assets (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          files=(packages/desktop/src-tauri/target/**/release/bundle/dmg/*.dmg)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No macOS DMG files found."
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber

      - name: Upload Release Assets (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          files=(packages/desktop/src-tauri/target/**/release/bundle/nsis/*.exe)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Windows NSIS installers found."
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber

      - name: Upload Release Assets (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          files=(packages/desktop/src-tauri/target/**/release/bundle/deb/*.deb)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Linux DEB files found."
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
